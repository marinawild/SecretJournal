<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Secret Journal Portal</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .portal-zoom {
            transform: scale(8) rotate(15deg);
            opacity: 0;
            filter: blur(20px);
            transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }


        #status-text {
            font-style: italic;
            color: rgba(255,255,255,0.75);
            margin-top: 10px;
        }
    </style>
</head>
<body class="index-bg">
    <div id="portal-container" class="container" style="text-align: center;">
        <h1>The Vault</h1>

        <p id="status-text">Awaiting physical authorization to enter...</p>
    </div>

    <script>
        function triggerWarp() {
            const container = document.getElementById('portal-container');
            const status    = document.getElementById('status-text');

            if (status)    status.innerText = "Access Granted. Entering...";
            if (container) container.classList.add('portal-zoom');

            setTimeout(() => {
                window.location.href = "/verify-page";
            }, 1500);
        }

        // SIMULATION: Press 'S' key
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') triggerWarp();
        });

        // SIMULATION: Click the lock icon

        // HARDWARE: Arduino → server → WebSocket → browser
        const socket = new WebSocket(`ws://${window.location.host}/ws/button`);

        socket.onmessage = function(event) {
            console.log("WebSocket message received:", event.data);
            if (event.data === "pressed") {
                triggerWarp();
            }
        };

        socket.onerror = function(err) {
            console.error("WebSocket error:", err);
        };
    </script>
</body>
</html>
